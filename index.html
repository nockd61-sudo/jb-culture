<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>전북 문화예술소식 | 14개 시·군 통합 플랫폼</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Noto Sans KR',Arial,sans-serif;background:#0b1a2b;color:#fff}
a{text-decoration:none;color:inherit}
button,input,textarea,select{font-family:inherit}

header{
  height:72px;display:flex;align-items:center;justify-content:space-between;
  padding:0 6%;position:fixed;width:100%;z-index:100;
  background:rgba(10,20,40,.72);backdrop-filter:blur(10px)
}
.logo{font-weight:900;font-size:22px}
.logo span{display:block;font-size:11px;color:#6fb3ff}
nav{display:flex;gap:26px;font-weight:800}

.hero{
  height:560px;display:flex;align-items:center;justify-content:center;text-align:center;padding-top:70px;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,180,90,.24), transparent 28%),
    radial-gradient(circle at 80% 30%, rgba(70,130,255,.28), transparent 30%),
    linear-gradient(135deg,#071a2f 0%,#0e2f4d 48%,#245d7a 100%)
}
.hero h1{font-size:54px;font-weight:900;line-height:1.18;margin:0;letter-spacing:-2px}
.hero h1 span{color:#7b86ff}
.hero p{margin-top:16px;font-size:19px;color:#d6e1ee;font-weight:700}
.hero button{
  margin-top:28px;border:0;background:#6578ff;color:#fff;padding:13px 28px;
  border-radius:999px;font-weight:900;cursor:pointer
}

main{max-width:1160px;margin:-90px auto 70px;padding:0 20px;position:relative;z-index:5}
.section{
  background:#fff;color:#111;border-radius:28px;padding:28px;
  box-shadow:0 20px 60px rgba(0,0,0,.22)
}
.section h2{margin:0;font-size:28px;font-weight:900}
.section p{margin:6px 0 20px;color:#666;font-weight:700}

.city-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:10px;
}
.city-card{
  height:86px;border-radius:15px;overflow:hidden;position:relative;
  cursor:pointer;transition:.25s;box-shadow:0 7px 16px rgba(0,0,0,.16)
}
.city-card:hover{transform:translateY(-4px)}
.city-card img{width:100%;height:100%;object-fit:cover}
.city-card::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.72),rgba(0,0,0,.15))
}
.city-card h3{
  position:absolute;bottom:9px;left:10px;color:#fff;margin:0;z-index:1;font-size:15px
}

.detail{
  display:none;margin-top:24px;background:#f6f8fb;color:#111;border-radius:24px;padding:24px
}
.detail.active{display:block}
.detail-head{
  display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px
}
.detail-head h2{margin:0;font-size:25px}
.close-btn{
  border:0;background:#0b1a2b;color:#fff;border-radius:999px;
  padding:10px 18px;font-weight:900;cursor:pointer
}

.detail-layout{
  display:grid;grid-template-columns:1.15fr .85fr;gap:22px
}

.preview-news{
  display:grid;gap:14px
}
.news-card{
  background:#fff;border-radius:18px;padding:16px;
  box-shadow:0 8px 20px rgba(0,0,0,.07)
}
.news-card img{
  width:100%;max-height:230px;object-fit:cover;border-radius:14px;margin:10px 0
}
.news-card h3{margin:0 0 8px;font-size:19px}
.meta{color:#666;font-size:14px;font-weight:700;margin:5px 0}
.badge{
  display:inline-block;background:#e9efff;color:#4356d8;
  padding:5px 9px;border-radius:999px;font-size:12px;font-weight:900;margin-bottom:8px
}

.upload{
  background:#fff;border-radius:18px;padding:18px;
  box-shadow:0 8px 20px rgba(0,0,0,.07)
}
.upload h3{margin:0 0 14px}
.upload input,.upload textarea,.upload select{
  width:100%;margin-bottom:10px;padding:12px;border-radius:11px;
  border:1px solid #d9dee8;font-size:14px
}
.upload textarea{height:105px;resize:none}
.upload button{
  width:100%;padding:14px;border:0;background:#6578ff;color:#fff;
  border-radius:12px;font-weight:900;cursor:pointer
}
.preview-box img{
  width:100%;max-height:190px;object-fit:cover;border-radius:14px;margin:8px 0 12px
}

footer{text-align:center;padding:38px;color:#aeb8c7}

@media(max-width:900px){
  nav{display:none}
  .hero h1{font-size:36px}
  .city-grid{grid-template-columns:repeat(3,1fr)}
  .detail-layout{grid-template-columns:1fr}
}
@media(max-width:500px){
  .hero{height:500px}
  .hero h1{font-size:30px}
  .city-grid{grid-template-columns:repeat(2,1fr)}
  .city-card{height:78px}
}
</style>
</head>

<body>

<header>
  <div class="logo">
    전북문화예술소식
    <span>14개 시·군 통합 플랫폼</span>
  </div>
  <nav>
    <a href="#cities">시·군</a>
    <a href="#cities">문화소식</a>
  </nav>
</header>

<section class="hero">
  <div>
    <h1>전북의 모든 <span>문화예술소식</span><br>한곳에서 만나다</h1>
    <p>지역을 선택하면 문화소식을 보고, 직접 소식을 올릴 수 있습니다.</p>
    <button onclick="scrollCities()">14개 시·군 선택하기</button>
  </div>
</section>

<main>
<section class="section" id="cities">
  <h2>14개 시·군 문화소식</h2>
  <p>작은 지역 카드를 클릭하면 아래에 소식 보기와 소식 올리기 창이 열립니다.</p>

  <div class="city-grid">
    <div class="city-card" onclick="openCity('전주시')"><img src="https://images.unsplash.com/photo-1528164344705-47542687000d?auto=format&fit=crop&w=800&q=80"><h3>전주시</h3></div>
    <div class="city-card" onclick="openCity('군산시')"><img src="https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?auto=format&fit=crop&w=800&q=80"><h3>군산시</h3></div>
    <div class="city-card" onclick="openCity('익산시')"><img src="https://images.unsplash.com/photo-1524492412937-b28074a5d7da?auto=format&fit=crop&w=800&q=80"><h3>익산시</h3></div>
    <div class="city-card" onclick="openCity('정읍시')"><img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e?auto=format&fit=crop&w=800&q=80"><h3>정읍시</h3></div>
    <div class="city-card" onclick="openCity('남원시')"><img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=800&q=80"><h3>남원시</h3></div>
    <div class="city-card" onclick="openCity('김제시')"><img src="https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=800&q=80"><h3>김제시</h3></div>
    <div class="city-card" onclick="openCity('완주군')"><img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=800&q=80"><h3>완주군</h3></div>
    <div class="city-card" onclick="openCity('진안군')"><img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=800&q=80"><h3>진안군</h3></div>
    <div class="city-card" onclick="openCity('무주군')"><img src="https://images.unsplash.com/photo-1483728642387-6c3bdd6c93e5?auto=format&fit=crop&w=800&q=80"><h3>무주군</h3></div>
    <div class="city-card" onclick="openCity('장수군')"><img src="https://images.unsplash.com/photo-1513836279014-a89f7a76ae86?auto=format&fit=crop&w=800&q=80"><h3>장수군</h3></div>
    <div class="city-card" onclick="openCity('임실군')"><img src="https://images.unsplash.com/photo-1516467508483-a7212febe31a?auto=format&fit=crop&w=800&q=80"><h3>임실군</h3></div>
    <div class="city-card" onclick="openCity('순창군')"><img src="https://images.unsplash.com/photo-1501004318641-b39e6451bec6?auto=format&fit=crop&w=800&q=80"><h3>순창군</h3></div>
    <div class="city-card" onclick="openCity('고창군')"><img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=800&q=80"><h3>고창군</h3></div>
    <div class="city-card" onclick="openCity('부안군')"><img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=800&q=80"><h3>부안군</h3></div>
  </div>

  <div class="detail" id="detail"></div>
</section>
</main>

<footer>© 2026 전북 문화예술소식 플랫폼</footer>

<script>
let currentCity="전주시";

const sampleNews={
  "전주시":["전주 한옥마을 문화예술 프로그램","전주 지역작가 전시 소식"],
  "군산시":["군산 근대문화거리 행사","군산 시간여행 문화공연"],
  "익산시":["익산 백제문화 탐방","익산 시민문화공연"],
  "정읍시":["정읍 내장산 문화행사","정읍 지역작가 전시"],
  "남원시":["남원 춘향문화 행사","남원 국악공연"],
  "김제시":["김제 지평선 문화축제","김제 농경문화 체험"],
  "완주군":["완주 예술마을 프로그램","완주 문화공간 전시"],
  "진안군":["진안 마이산 문화행사","진안 산촌문화 체험"],
  "무주군":["무주 산골문화예술제","무주 자연문화 체험"],
  "장수군":["장수 자연문화 축제","장수 지역문화 탐방"],
  "임실군":["임실 치즈문화 축제","임실 문화예술 공연"],
  "순창군":["순창 장류문화 체험","순창 전통문화 행사"],
  "고창군":["고창 세계유산 문화행사","고창 역사문화 탐방"],
  "부안군":["부안 변산반도 문화여행","부안 해양문화 축제"]
};

function scrollCities(){
  document.getElementById("cities").scrollIntoView({behavior:"smooth"});
}

function openCity(city){
  currentCity=city;
  const detail=document.getElementById("detail");
  const news=(sampleNews[city]||[]).map(item=>`
    <div class="news-card">
      <span class="badge">기본 소식</span>
      <h3>${item}</h3>
      <div class="meta">${city} · 일정 업데이트 예정</div>
      <p>해당 지역의 문화예술 행사, 전시, 공연 정보를 이곳에서 확인할 수 있습니다.</p>
    </div>
  `).join("");

  detail.classList.add("active");
  detail.innerHTML=`
    <div class="detail-head">
      <div>
        <h2>${city} 문화예술소식</h2>
        <p>${city}의 소식을 보고 직접 등록할 수 있습니다.</p>
      </div>
      <button class="close-btn" onclick="closeDetail()">닫기</button>
    </div>

    <div class="detail-layout">
      <div>
        <h3>등록된 소식이 이렇게 보입니다</h3>
        <div id="postedList" class="preview-news">
          ${news}
        </div>
      </div>

      <div class="upload">
        <h3>${city} 소식 올리기</h3>
        <select id="postType">
          <option>행사·축제</option>
          <option>전시·공연</option>
          <option>문화유산</option>
          <option>교육·체험</option>
          <option>기타</option>
        </select>
        <input id="postTitle" placeholder="소식 제목">
        <input id="postDate" type="date">
        <input id="postPlace" placeholder="장소">
        <input id="postImage" type="file" accept="image/*" onchange="previewImage(event)">
        <div id="imagePreview" class="preview-box"></div>
        <textarea id="postText" placeholder="내용을 입력하세요"></textarea>
        <button onclick="addPost()">소식 등록</button>
      </div>
    </div>
  `;

  detail.scrollIntoView({behavior:"smooth"});
}

function closeDetail(){
  document.getElementById("detail").classList.remove("active");
}

function previewImage(event){
  const file=event.target.files[0];
  const preview=document.getElementById("imagePreview");
  if(!file){preview.innerHTML="";return;}

  const reader=new FileReader();
  reader.onload=function(e){
    preview.innerHTML=`<img id="uploadedPreviewImg" src="${e.target.result}">`;
  };
  reader.readAsDataURL(file);
}

function addPost(){
  const type=document.getElementById("postType").value;
  const title=document.getElementById("postTitle").value.trim();
  const date=document.getElementById("postDate").value;
  const place=document.getElementById("postPlace").value.trim();
  const text=document.getElementById("postText").value.trim();
  const img=document.getElementById("uploadedPreviewImg");

  if(!title){
    alert("소식 제목을 입력해주세요.");
    return;
  }

  const imageHtml=img ? `<img src="${img.src}">` : "";

  document.getElementById("postedList").innerHTML=`
    <div class="news-card">
      <span class="badge">${type}</span>
      <h3>${title}</h3>
      <div class="meta">${currentCity} · ${date || "날짜 미입력"} · ${place || "장소 미입력"}</div>
      ${imageHtml}
      <p>${text || "내용 없음"}</p>
    </div>
  ` + document.getElementById("postedList").innerHTML;

  document.getElementById("postTitle").value="";
  document.getElementById("postDate").value="";
  document.getElementById("postPlace").value="";
  document.getElementById("postText").value="";
  document.getElementById("postImage").value="";
  document.getElementById("imagePreview").innerHTML="";

  alert("소식이 등록되었습니다.");
}
</script>

</body>
</html>
